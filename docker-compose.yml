services:
  app:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: contenedorAPP
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: base_empleados
    depends_on:
      db:
        condition: service_healthy
    networks:
      - red-app

  db:
    image: mysql:latest
    container_name: contenedorBD
    environment:
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - volumen-BD:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - red-app

networks:
  red-app:
    driver: bridge

volumes:
  volumen-BD:
    external: true
